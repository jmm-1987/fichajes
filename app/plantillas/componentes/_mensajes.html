{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  <div class="container-fluid px-3 pt-3">
    {% for category, message in messages %}
    <div class="alert alert-{{ 'danger' if category == 'peligro' else 'success' if category == 'exito' else 'info' if category == 'info' else 'warning' }} alert-dismissible fade show" role="alert">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
  </div>
  {% endif %}
{% endwith %}
