<header class="barra-superior shadow-sm">
  <div class="container-fluid d-flex align-items-center justify-content-between py-2 px-3">
    <a href="{{ url_for('inicio_bp.panel') }}" class="marca d-flex align-items-center gap-2 text-decoration-none">
      <span class="marca-icono">◆</span>
      <span class="marca-texto">Control horario</span>
    </a>
    <div class="d-flex align-items-center gap-3">
      {% if current_user.is_authenticated %}
      <span class="text-muted small d-none d-md-inline">{{ current_user.correo_electronico }} · {{ current_user.rol }}</span>
      <a class="btn btn-outline-light btn-sm" href="{{ url_for('autenticacion_bp.cerrar_sesion') }}">Salir</a>
      {% endif %}
    </div>
  </div>
</header>
